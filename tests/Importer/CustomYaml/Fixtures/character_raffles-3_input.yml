name: Raffles-3

abilityScores:
  STR: 8
  DEX: 15
  CON: 13
  INT: 10
  WIS: 12
  CHA: 14

race:
  name: Catfolk
  subrace: Malkin
  sources:
    - name: Tome of Heroes
      extra: p12

  movement:
    walk: 30
    climb: 20
  size: Small

  features:
    - name: darkvision
      description: >
        You can see in dim light within 60 feet of you as if it were
        bright light, and in darkness as if it were dim light. You discern
        colors in that darkness only as shades of gray.
    - name: Feline agility
      description: >
        Your reflexes and agility allow you to move with a burst of speed.
        When you move on your turn in combat, you can double your speed
        until the end of the turn. Once you use this trait, you can't use
        it again until you move 0 feet on one of your turns.

  proficiencies:
    skills:
      - Perception
      - Stealth

classes:
  - name: Rogue
    sources:
      - name: Players Handbook
        extra: p94
    subClass:
      name: Swashbuckler
      sources:
        - name: Xanthars Guide to Everything
          extra: p47
    level: 3

    hitPoints:
      description: >
        Hit Dice: 1d8 per rogue level
        Hit Points at 1st Level: 8 + your Constitution modifier
        Hit Points at Higher Levels: 1d8 (or 5) + your Constitution
        modifier per rogue level after 1st
      baseValue: 8
      levelingValue: 5

    features:
      # Level 1
      - name: Expertise
        type: skill-proficiency
        description: >
          At 1st level, choose two of your skill proficiencies, or one of
          your skill proficiencies and your proficiency with thieves'
          tools. Your proficiency bonus is doubled for any ability check
          you make that uses either of the chosen proficiencies.

          At 6th level, you can choose two more of your proficiencies
          (in skills or with thieves' tools) to gain this benefit.
        proficiencies:
          skills:
            - Athletics
            - Stealth
      - name: Sneak Attack
        description: >
          Beginning at 1st level, you know how to strike subtly and
          exploit a foe's distraction. Once per turn, you can deal an
          extra 1d6 damage to one creature you hit with an attack if you
          have advantage on the attack roll. The attack must use a finesse
          or a ranged weapon.

          You don't need advantage on the attack roll if another enemy of
          the target is within 5 feet of it, that enemy isn't
          incapacitated, and you don't have disadvantage on the attack
          roll.

          The amount of the extra damage increases as you gain levels in
          this class, as shown in the Sneak Attack column of the Rogue
          table.
      - name: Thieves's Cant
        proficiencies:
          languages:
            - Thieves's Cant
        description: >
          During your rogue training you learned thieves' cant, a secret
          mix of dialect, jargon, and code that allows you to hide
          messages in seemingly normal conversation. Only another creature
          that knows thieves' cant understands such messages. It takes
          four times longer to convey such a message than it does to speak
          the same idea plainly.

          In addition, you understand a set of secret signs and symbols
          used to convey short, simple messages, such as whether an area
          is dangerous or the territory of a thieves' guild, whether loot
          is nearby, or whether the people in an area are easy marks or
          will provide a safe house for thieves on the run.
      # Level 3
      - name: Fancy Footwork
        description: >
          During your turn, if you make a melee attack against a creature,
          that creature can't make opportunity attacks against you for the
          rest of your turn.
      - name: Rakish Audacity
        description: >
          You can give yourself a bonus to your initiative rolls equal to
          your Charisma modifier.

          You also gain an additional way to use your Sneak Attack; you
          don't need advantage on the attack roll to use your Sneak Attack
          against a creature if you are within 5 feet of it, no other
          creatures are within 5 feet of you, and you don't have
          disadvantage on the attack roll. All the other rules for Sneak
          Attack still apply to you.

    proficiencies:
      skills:
        - Acrobatics
        - Athletics
        - Deception
        - Sleight of hand
      savingThrows:
        - DEX
        - INT
      tools:
        - Thieves tools
      armor:
        - Light armor
      weapons:
        - Simple weapons
        - Hand crossbows
        - Longswords
        - Rapiers
        - Shortswords

background:
  name: Thief for hire
  proficiencies:
    languages:
      - Goblin
    skills:
      - Persuasion
      - Investigation
    tools:
      - Disguise kit

  traits:
    - A gentleman thief
    - Confidence can get me anywhere
  bonds:
    - I bring justice to the world
  ideals:
    - I only steal what the person I steal from can afford
  flaws:
    - Greed gets the best of me

inventory:
  - name: backpack
    items:
      - name: Leather armor
        type: armor
        armor:
          class: 11
          type: light
        equipped: true
      - name: Dagger
        quantity: 2
        type: weapon
        damage:
          value: 1d4
          type: slashing
        equipped: true
      - name: Shortbow (+quiver)
        type: weapon
        damage:
          value: 1d6
          type: piercing
        equipped: true
      - name: Thieves tools
        type: gear
      - name: Crowbar
        type: gear
      - name: Common clothes including hood
        type: gear
      - name: Burglar pack (3 uses)
        type: gear

wallet:
  gp: 114
  sp: 8
